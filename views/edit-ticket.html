<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ticket</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <header>
        <h1>✏️ Edit Ticket</h1>
    </header>

    <div class="container">

        <form id="ticketForm">

            <label>Title</label>
            <input
                type="text"
                id="title"
                required
            >

            <label>Description</label>
            <textarea
                id="description"
                rows="5"
                required
            ></textarea>

            <label>Status</label>
            <select id="status">
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Closed">Closed</option>
            </select>

            <label>Priority</label>
            <select id="priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>

            <br><br>

            <button type="submit">
                Update Ticket
            </button>

            <button
                type="button"
                onclick="window.location.href='/'"
            >
                Cancel
            </button>

        </form>

    </div>

    <script src="/edit-ticket.js"></script>

</body>
</html>
