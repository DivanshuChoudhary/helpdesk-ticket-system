<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ticket</title>

    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1>✏️ Edit Ticket</h1>
</header>

<div class="container">

    <form id="editTicketForm">

        <label>Title</label>
        <input
            type="text"
            id="title"
            required
        >

        <label>Description</label>
        <textarea
            id="description"
            required
        ></textarea>

        <label>Status</label>
        <select id="status">
            <option>Open</option>
            <option>In Progress</option>
            <option>Closed</option>
        </select>

        <label>Priority</label>
        <select id="priority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

<script src="/edit-ticket.js"></script>

</body>
</html>
